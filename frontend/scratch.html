<!DOCTYPE html>
<html>
<head>
<style>
  .container { width: 1000px; background: yellow; padding: 20px; }
  .child { max-width: 500px; margin: 0 auto; background: red; height: 50px; }
  .child2 { width: 100%; max-width: 500px; margin: 0 auto; background: blue; height: 50px; }
</style>
</head>
<body>
  <div class="container">
    <div class="child">Child 1 (auto width)</div>
    <div class="child2">Child 2 (100% width)</div>
  </div>
</body>
</html>
